<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat webCLI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    #container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #sidebar {
      width: 250px;
      background: #0d1117;
      border-right: 1px solid #2d3148;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 12px 14px;
      border-bottom: 1px solid #2d3148;
      display: flex;
      gap: 8px;
    }

    #new-chat-btn {
      flex: 1;
      padding: 8px 12px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #new-chat-btn:hover { background: #6d28d9; }

    #chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .chat-item {
      padding: 10px 12px;
      margin-bottom: 4px;
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      overflow: hidden;
    }

    .chat-item:hover { background: #252836; border-color: #3d4265; }
    .chat-item.active { background: #7c3aed; border-color: #7c3aed; }

    .chat-item-text {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 0.8rem;
    }

    .chat-item-delete {
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      padding: 2px 4px;
      font-size: 0.8rem;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .chat-item-delete:hover { color: #ff6b6b; }

    .chat-item-text {
      flex: 1;
      min-width: 0;
    }

    .chat-title {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-model {
      font-size: 0.7rem;
      color: #7c3aed;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-title-edit {
      width: 100%;
      background: #1f2937;
      border: 1px solid #7c3aed;
      color: #e2e8f0;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.9rem;
      font-family: inherit;
    }

    .chat-title-edit:focus {
      outline: none;
      border-color: #a78bfa;
    }

    #main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 14px 20px;
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #a78bfa;
      white-space: nowrap;
    }

    #header-meta {
      width: 100%;
      font-size: 0.74rem;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: -4px;
    }
    #header-meta svg { flex-shrink: 0; }
    #header-meta a {
      color: #7c6fcd;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #header-meta a:hover { color: #a78bfa; }

    #model-select {
      flex: 1;
      min-width: 220px;
      background: #252836;
      color: #e2e8f0;
      border: 1px solid #3d4265;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    #load-btn {
      padding: 8px 18px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    #load-btn:hover:not(:disabled) { background: #6d28d9; }

    #upload-btn {
      padding: 8px 18px;
      background: #10b981;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    #upload-btn:hover { background: #059669; }
    #load-btn:disabled { background: #4b5563; cursor: not-allowed; }

    #status-bar {
      padding: 8px 20px;
      background: #131520;
      font-size: 0.78rem;
      color: #94a3b8;
      min-height: 34px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #progress-wrap {
      flex: 1;
      background: #1e2235;
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
      display: none;
    }
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
      border-radius: 99px;
      width: 0%;
      transition: width 0.3s;
    }

    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: background-color 0.2s;
    }

    #chat-window.drag-over {
      background-color: rgba(124, 58, 237, 0.1);
      border: 2px dashed #7c3aed;
    }

    .doc-info {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.9rem;
      color: #a0aec0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .doc-info-text {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .doc-info-remove {
      background: none;
      border: none;
      color: #ff6b6b;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .doc-info-remove:hover {
      background: rgba(255, 107, 107, 0.1);
    }

    .msg {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 14px;
      line-height: 1.6;
      font-size: 0.92rem;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: break-word;
    }
    .msg strong { color: #fff; font-weight: 700; }
    .msg em { font-style: italic; color: #b4a7ff; }
    .msg code {
      background: rgba(0,0,0,0.3);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 0.88em;
      color: #c4b5fd;
    }
    .msg pre {
      background: rgba(0,0,0,0.4);
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 8px 0;
      border-left: 3px solid #7c3aed;
    }
    .msg pre code {
      background: none;
      padding: 0;
      color: #e2e8f0;
      font-size: 0.85em;
    }
    .msg h1, .msg h2, .msg h3 {
      color: #a78bfa;
      margin-top: 12px;
      margin-bottom: 6px;
    }
    .msg ul {
      margin: 8px 0;
      padding-left: 20px;
    }
    .msg li {
      margin: 4px 0;
    }
    .msg a {
      color: #7c3aed;
      text-decoration: underline;
    }
    .msg a:hover {
      color: #a78bfa;
    }
    .msg.user {
      align-self: flex-end;
      background: #7c3aed;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #1e2235;
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }
    .msg.system {
      align-self: center;
      background: #2d3148;
      color: #a0aec0;
      border-radius: 8px;
      font-size: 0.9rem;
      max-width: 80%;
      text-align: center;
    }
    .msg.system:hover {
      background: #3d4158;
    }
    .msg.assistant.streaming::after {
      content: "▍";
      display: inline-block;
      animation: blink 0.8s step-start infinite;
      margin-left: 2px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .msg-label {
      font-size: 0.7rem;
      color: #64748b;
      margin-bottom: 3px;
    }
      flex-wrap: wrap;
    }

    .msg-wrap { display: flex; flex-direction: column; }
    .msg-wrap.user { align-items: flex-end; }
    .msg-wrap.assistant { align-items: flex-start; }

    #input-area {
      padding: 14px 20px;
      background: #1a1d27;
      border-top: 1px solid #2d3148;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: #252836;
      color: #e2e8f0;
      border: 1px solid #3d4265;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.92rem;
      resize: none;
      max-height: 140px;
      line-height: 1.5;
      font-family: inherit;
    }
    #user-input:focus { outline: none; border-color: #7c3aed; }
    #user-input::placeholder { color: #4b5563; }

    #send-btn {
      padding: 10px 18px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
      height: 42px;
    }
    #send-btn:hover:not(:disabled) { background: #6d28d9; }
    #send-btn:disabled { background: #4b5563; cursor: not-allowed; }

    .input-icon-btn {
      background: none;
      border: none;
      color: #7c3aed;
      cursor: pointer;
      padding: 8px 12px;
      font-size: 1rem;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .input-icon-btn:hover:not(:disabled) { color: #a78bfa; }
    .input-icon-btn:disabled { color: #4b5563; cursor: not-allowed; }

    .empty-state {
      margin: auto;
      text-align: center;
      color: #4b5563;
    }
    .empty-state svg { margin-bottom: 12px; opacity: 0.4; }
    .empty-state p { font-size: 0.9rem; }

    /* ── Responsive ─────────────────────────────────────────── */

    /* Tablet: wider bubbles, slightly tighter header */
    @media (max-width: 768px) {
      .msg { max-width: 85%; }
      #model-select { min-width: 160px; }
    }

    /* Mobile: stack header controls, full-width select + button */
    @media (max-width: 600px) {
      header {
        padding: 10px;
        border-radius: 8px;
      }

      #header-meta {
        flex-wrap: wrap;
        gap: 8px;
        row-gap: 4px;
      }

      #header-meta > span {
        width: 100%;
        font-size: 0.7rem;
      }

      #status-bar {
        padding: 6px 14px;
        font-size: 0.72rem;
        flex-wrap: wrap;
      }

      #chat-window {
        padding: 12px 14px;
        gap: 10px;
      }

      .msg {
        max-width: 92%;
        font-size: 0.88rem;
        padding: 10px 13px;
      }

      #input-area {
        padding: 10px 14px;
        gap: 8px;
      }

      #user-input {
        font-size: 0.88rem;
        padding: 9px 12px;
      }

      #send-btn {
        padding: 9px 14px;
        font-size: 0.88rem;
        height: 40px;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
</head>
<body>
  <header>
    <h1><i class="fas fa-comments"></i> Chat webCLI</h1>
    <select id="model-select" aria-label="Select model"></select>
    <button id="load-btn">Load Model</button>
    <button id="upload-btn" title="Upload a document for RAG" style="display:none;"><i class="fas fa-file-upload"></i> Upload Document</button>
    <input type="file" id="file-input" accept=".txt,.pdf" style="display:none;">
    <div id="header-meta">
      <span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:3px">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        All inference on your device - your conversations never leave
      </span>
      <a href="https://github.com/tejaswigowda/chat-webCLI" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        tejaswigowda/chat-webCLI
      </a>
    </div>
  </header>

  <div id="container">
    <div id="sidebar">
      <div id="sidebar-header">
        <button id="new-chat-btn"><i class="fas fa-plus"></i> New Chat</button>
      </div>
      <div id="chat-list"></div>
    </div>

    <div id="main-area">
      <div id="status-bar">
        <span id="status-text">Select a model and click Load Model to begin.</span>
        <div id="progress-wrap"><div id="progress-bar"></div></div>
      </div>

      <div id="chat-window">
        <div class="empty-state" id="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <p>Load a model to start chatting</p>
        </div>
      </div>

      <div id="input-area">
        <button id="upload-icon-btn" class="input-icon-btn" title="Upload a document for RAG" style="border:1px solid; margin-bottom:5px;border-radius:50%"><i class="fas fa-arrow-up"></i></button>
        <textarea id="user-input" rows="1" placeholder="Type a message..." disabled></textarea>
        <button id="send-btn" disabled>Send</button>
      </div>
    </div>
  </div>

  <script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const modelSelect  = document.getElementById("model-select");
    const loadBtn      = document.getElementById("load-btn");
    const uploadBtn    = document.getElementById("upload-btn");
    const uploadIconBtn = document.getElementById("upload-icon-btn");
    const fileInput    = document.getElementById("file-input");
    const statusText   = document.getElementById("status-text");
    const progressWrap = document.getElementById("progress-wrap");
    const progressBar  = document.getElementById("progress-bar");
    const chatWindow   = document.getElementById("chat-window");
    const emptyState   = document.getElementById("empty-state");
    const userInput    = document.getElementById("user-input");
    const sendBtn      = document.getElementById("send-btn");
    const newChatBtn   = document.getElementById("new-chat-btn");
    const chatList     = document.getElementById("chat-list");

    // Multi-chat storage
    let currentChatId = null;
    let allChats = {};
    let editingChatId = null;

    // Load chats from localStorage
    function loadChatsFromStorage() {
      const stored = localStorage.getItem("chat-webCLI-chats");
      if (stored) {
        allChats = JSON.parse(stored);
        if (Object.keys(allChats).length > 0 && !currentChatId) {
          const firstChatId = Object.keys(allChats)[0];
          switchChat(firstChatId);
        }
      } else {
        createNewChat();
      }
      renderChatList();
    }

    // Save chats to localStorage
    function saveChatsToStorage() {
      localStorage.setItem("chat-webCLI-chats", JSON.stringify(allChats));
    }

    // Create a new chat
    function createNewChat() {
      const chatId = Date.now().toString();
      const title = `Chat ${new Date().toLocaleTimeString()}`;
      allChats[chatId] = {
        id: chatId,
        title: title,
        messages: [],
        createdAt: new Date().toISOString(),
        model: null,
        modelsUsed: [],
        docChunks: [],
        docName: null
      };
      currentChatId = chatId;
      saveChatsToStorage();
      renderChatList();
      loadCurrentChat();
      displayDocumentInfo();
    }

    // Switch to a different chat
    function switchChat(chatId) {
      if (allChats[chatId]) {
        currentChatId = chatId;
        loadCurrentChat();
        renderChatList();
      }
    }

    // Load messages from current chat into history and UI
    function loadCurrentChat() {
      if (!currentChatId || !allChats[currentChatId]) return;
      const chat = allChats[currentChatId];
      history.length = 0;
      chatWindow.innerHTML = "";
      
      // Restore messages to history array
      history.push(...chat.messages);
      
      // Render messages in UI
      if (chat.messages.length === 0) {
        emptyState.style.display = "flex";
      } else {
        emptyState.style.display = "none";
        chat.messages.forEach(msg => {
          appendMessage(msg.role, msg.content, false);
        });
      }
    }

    // Display document info if present
    function displayDocumentInfoOnLoad() {
      displayDocumentInfo();
    }

    // Save current chat to storage
    function saveCurrentChat() {
      if (!currentChatId || !allChats[currentChatId]) return;
      allChats[currentChatId].messages = history.map(msg => ({
        role: msg.role,
        content: msg.content
      }));
      saveChatsToStorage();
    }

    // Delete a chat
    function deleteChat(chatId) {
      if (!allChats[chatId]) return;
      delete allChats[chatId];
      editingChatId = null;
      if (currentChatId === chatId) {
        if (Object.keys(allChats).length > 0) {
          const nextChatId = Object.keys(allChats)[0];
          switchChat(nextChatId);
        } else {
          createNewChat();
        }
      }
      saveChatsToStorage();
      renderChatList();
    }

    // Render chat list sidebar
    function renderChatList() {
      chatList.innerHTML = "";
      Object.values(allChats)
        .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
        .forEach(chat => {
          const chatItem = document.createElement("div");
          chatItem.className = `chat-item ${chat.id === currentChatId ? "active" : ""}`;
          
          const textDiv = document.createElement("div");
          textDiv.className = "chat-item-text";
          textDiv.style.cursor = "pointer";
          
          // Check if this chat is being edited
          if (editingChatId === chat.id) {
            const input = document.createElement("input");
            input.type = "text";
            input.value = chat.title;
            input.className = "chat-title-edit";
            textDiv.appendChild(input);
            input.focus();
            input.select();
            
            const saveTitle = () => {
              const newTitle = input.value.trim();
              if (newTitle && newTitle !== chat.title) {
                chat.title = newTitle;
                saveChatsToStorage();
              }
              editingChatId = null;
              renderChatList();
            };
            
            const cancelEdit = () => {
              editingChatId = null;
              renderChatList();
            };
            
            input.addEventListener("blur", saveTitle);
            input.addEventListener("keydown", (e) => {
              e.stopPropagation();
              if (e.key === "Enter") saveTitle();
              if (e.key === "Escape") cancelEdit();
            });
          } else {
            textDiv.innerHTML = `<span class="chat-title">${escapeHtml(chat.title)}</span>`;
            if (chat.model) {
              textDiv.innerHTML += `<div class="chat-model">${escapeHtml(chat.model)}</div>`;
            }
            textDiv.title = "Double-click to edit title";
            textDiv.addEventListener("dblclick", (e) => {
              e.stopPropagation();
              editingChatId = chat.id;
              renderChatList();
            });
          }
          
          const deleteBtn = document.createElement("button");
          deleteBtn.className = "chat-item-delete";
          deleteBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
          deleteBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            if (confirm(`Delete chat "${chat.title}"?`)) {
              deleteChat(chat.id);
            }
          });
          
          chatItem.appendChild(textDiv);
          chatItem.appendChild(deleteBtn);
          chatItem.addEventListener("click", () => {
            if (editingChatId === null) switchChat(chat.id);
          });
          
          chatList.appendChild(chatItem);
        });
    }
    
    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    // ──── Document RAG Functions ────

    function getDocumentChunks() {
      if (!allChats[currentChatId] || !allChats[currentChatId].docChunks) {
        return [];
      }
      return allChats[currentChatId].docChunks;
    }

    function scoreRelevance(query, text) {
      const queryWords = query.toLowerCase().split(/\s+/).filter(w => w.length > 2);
      const textWords = text.toLowerCase().split(/\s+/);
      let score = 0;
      queryWords.forEach(word => {
        textWords.forEach(tword => {
          if (tword.includes(word) || word.includes(tword)) score++;
        });
      });
      return score;
    }

    function retrieveRelevantContext(query, maxChunks = 3) {
      const chunks = getDocumentChunks();
      if (chunks.length === 0) return "";
      
      const scored = chunks.map(chunk => ({
        text: chunk,
        score: scoreRelevance(query, chunk)
      })).filter(c => c.score > 0).sort((a, b) => b.score - a.score);
      
      const relevant = scored.slice(0, maxChunks).map(c => c.text).join("\n\n");
      return relevant ? `\n\n[Context from document]\n${relevant}` : "";
    }

    function displayDocumentInfo() {
      const chunks = getDocumentChunks();
      if (chunks.length === 0) return;
      
      const docName = allChats[currentChatId]?.docName || "Document";
      const docMessage = `📄 <strong>${docName}</strong> loaded (${chunks.length} chunks) - available for RAG queries`;
      
      // Create a collapsible document info message
      const wrap = document.createElement("div");
      wrap.className = "msg-wrap system";
      wrap.style.cursor = "pointer";
      
      const label = document.createElement("div");
      label.className = "msg-label";
      label.textContent = "System";
      
      const bubble = document.createElement("div");
      bubble.className = "msg system doc-info";
      bubble.innerHTML = docMessage;
      bubble.style.userSelect = "none";
      
      // Add hover effect
      wrap.addEventListener("mouseenter", () => wrap.style.opacity = "0.8");
      wrap.addEventListener("mouseleave", () => wrap.style.opacity = "1");
      
      // Add click to remove
      wrap.addEventListener("click", (e) => {
        e.stopPropagation();
        if (allChats[currentChatId]) {
          delete allChats[currentChatId].docChunks;
          delete allChats[currentChatId].docName;
          saveChatsToStorage();
          renderChatList();
          wrap.remove();
        }
      });
      
      wrap.appendChild(label);
      wrap.appendChild(bubble);
      chatWindow.appendChild(wrap);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function parseAndStoreDocument(text, fileName) {
      const chunkSize = 500;
      const chunks = [];
      for (let i = 0; i < text.length; i += chunkSize) {
        chunks.push(text.substring(i, i + chunkSize));
      }
      
      if (allChats[currentChatId]) {
        allChats[currentChatId].docChunks = chunks;
        allChats[currentChatId].docName = fileName;
        saveChatsToStorage();
        displayDocumentInfo();
        statusText.textContent = `Loaded ${fileName} (${chunks.length} chunks)`;
      }
    }

    async function extractPDFText(file) {
      try {
        if (!window.pdfjsLib) {
          throw new Error("PDF.js library not loaded");
        }
        
        // Set the worker
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = `https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js`;
        
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let text = "";
        
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const textContent = await page.getTextContent();
          const pageText = textContent.items.map(item => item.str).join(" ");
          text += pageText + "\n\n";
        }
        
        return text;
      } catch (err) {
        throw new Error(`Failed to parse PDF: ${err.message}`);
      }
    }

    function handleFileUpload(file) {
      if (!file) return;
      
      statusText.textContent = "Processing file...";
      
      if (file.type === "application/pdf") {
        extractPDFText(file).then(text => {
          parseAndStoreDocument(text, file.name);
        }).catch(err => {
          statusText.textContent = `Error: ${err.message}`;
        });
      } else {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            let text = e.target.result;
            parseAndStoreDocument(text, file.name);
          } catch (err) {
            statusText.textContent = `Error loading file: ${err.message}`;
          }
        };
        reader.onerror = () => {
          statusText.textContent = "Error reading file";
        };
        reader.readAsText(file);
      }
    }

    // Populate model dropdown from WebLLM's built-in model list
    const models = webllm.prebuiltAppConfig.model_list;
    function fmtVram(mb) {
      if (mb == null) return "";
      if (mb >= 1024) return ` -- ${(mb / 1024).toFixed(1)} GB`;
      return ` -- ${Math.round(mb)} MB`;
    }
    models.forEach(m => {
      const opt = document.createElement("option");
      opt.value = m.model_id;
      opt.textContent = m.model_id + fmtVram(m.vram_required_MB);
      modelSelect.appendChild(opt);
    });
    // Default to a small, fast model if available
    const preferred = ["Llama-3.2-1B-Instruct-q4f16_1-MLC", "SmolLM2-360M-Instruct-q0f16-MLC", "TinyLlama-1.1B-Chat-v1.0-q4f16_1-MLC"];
    for (const p of preferred) {
      const found = [...modelSelect.options].find(o => o.value === p);
      if (found) { modelSelect.value = p; break; }
    }

    let engine = null;
    const history = []; // {role, content}[]

    // Auto-resize textarea
    userInput.addEventListener("input", () => {
      userInput.style.height = "auto";
      userInput.style.height = Math.min(userInput.scrollHeight, 140) + "px";
    });

    // Rich text formatting
    function insertMarkdown(before, after) {
      const start = userInput.selectionStart;
      const end = userInput.selectionEnd;
      const text = userInput.value;
      const selected = text.substring(start, end) || "text";
      const newText = text.substring(0, start) + before + selected + after + text.substring(end);
      userInput.value = newText;
      userInput.selectionStart = start + before.length;
      userInput.selectionEnd = start + before.length + selected.length;
      userInput.focus();
      userInput.dispatchEvent(new Event('input'));
    }

    // Parse markdown in messages
    function parseMarkdown(text) {
      const div = document.createElement("div");
      
      // First escape HTML
      let html = text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
      
      // Process code blocks first (``` ... ```)
      html = html.replace(/```([\s\S]*?)```/g, "<pre><code>$1</code></pre>");
      
      // Process headings (# ## ###)
      html = html.replace(/^### (.+)$/gm, "<h3 style='margin:12px 0 4px;font-size:0.95rem;font-weight:600;'>$1</h3>");
      html = html.replace(/^## (.+)$/gm, "<h2 style='margin:14px 0 6px;font-size:1rem;font-weight:600;'>$1</h2>");
      html = html.replace(/^# (.+)$/gm, "<h1 style='margin:16px 0 8px;font-size:1.05rem;font-weight:700;'>$1</h1>");
      
      // Process links [text](url)
      html = html.replace(/\[(.+?)\]\((https?:\/\/[^\)]+)\)/g, "<a href='$2' target='_blank' style='color:#7c3aed;text-decoration:underline;'>$1</a>");
      
      // Process bold (**text**)
      html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      
      // Process italic (*text* but not if it's part of bold)
      html = html.replace(/(?<!\*)\*([^*]+?)\*(?!\*)/g, "<em>$1</em>");
      
      // Process inline code (`code`)
      html = html.replace(/`([^`]+?)`/g, "<code>$1</code>");
      
      // Process unordered lists (- item or * item)
      html = html.replace(/^[\s]*[\-\*] (.+)$/gm, "<li>$1</li>");
      html = html.replace(/(<li>.*?<\/li>)/s, "<ul style='margin:8px 0;padding-left:20px;'>$1</ul>");
      
      // Process line breaks (double newline = paragraph)
      html = html.replace(/\n\n+/g, "</p><p>");
      html = "<p>" + html + "</p>";
      
      // Clean up multiple p tags
      html = html.replace(/<p><\/p>/g, "");
      html = html.replace(/<p>(<pre>|<h|<ul>)/g, "$1");
      html = html.replace(/(<\/pre>|<\/h\d>|<\/ul>)<\/p>/g, "$1");
      
      div.innerHTML = html;
      return div;
    }

    // Load model
    loadBtn.addEventListener("click", async () => {
      const modelId = modelSelect.value;
      if (!modelId) return;

      loadBtn.disabled = true;
      modelSelect.disabled = true;
      userInput.disabled = true;
      sendBtn.disabled = true;
      history.length = 0;
      clearChat();

      statusText.textContent = `Loading ${modelId}…`;
      progressWrap.style.display = "block";
      progressBar.style.width = "0%";

      try {
        engine = await webllm.CreateMLCEngine(modelId, {
          initProgressCallback: (p) => {
            statusText.textContent = p.text ?? `Loading… ${Math.round((p.progress ?? 0) * 100)}%`;
            progressBar.style.width = Math.round((p.progress ?? 0) * 100) + "%";
          }
        });

        progressBar.style.width = "100%";
        statusText.textContent = `✓ ${modelId} loaded -- start chatting!`;
        progressWrap.style.display = "none";
        userInput.disabled = false;
        sendBtn.disabled = false;
        modelSelect.disabled = false;
        loadBtn.disabled = false;
        loadBtn.textContent = "Reload";
        userInput.focus();
      } catch (err) {
        statusText.textContent = `Error: ${err.message}`;
        progressWrap.style.display = "none";
        loadBtn.disabled = false;
        modelSelect.disabled = false;
        console.error(err);
      }
    });

    // Send message
    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text || !engine) return;

      userInput.value = "";
      userInput.style.height = "auto";
      sendBtn.disabled = true;
      uploadIconBtn.disabled = true;
      uploadIconBtn.disabled = true;
      userInput.disabled = true;
      emptyState.style.display = "none";

      appendMessage("user", text);
      history.push({ role: "user", content: text });
      
      // Capture model being used
      const selectedModel = modelSelect.value;
      if (selectedModel && allChats[currentChatId]) {
        allChats[currentChatId].model = selectedModel;
        if (!allChats[currentChatId].modelsUsed.includes(selectedModel)) {
          allChats[currentChatId].modelsUsed.push(selectedModel);
        }
      }
      
      saveCurrentChat();
      renderChatList();

      const assistantDiv = appendMessage("assistant", "", true, selectedModel);

      try {
        // Get RAG context if documents are loaded
        const ragContext = retrieveRelevantContext(text);
        const systemPrompt = `You are a helpful AI assistant.${ragContext ? ragContext : ""}`;

        const chunks = await engine.chat.completions.create({
          messages: [
            { role: "system", content: systemPrompt },
            ...history
          ],
          stream: true,
          temperature: 0.7,
        });

        let reply = "";
        for await (const chunk of chunks) {
          const delta = chunk.choices[0]?.delta?.content ?? "";
          reply += delta;
          assistantDiv.textContent = reply;
          chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        assistantDiv.classList.remove("streaming");
        // Parse markdown after streaming completes
        assistantDiv.innerHTML = "";
        assistantDiv.appendChild(parseMarkdown(reply));
        history.push({ role: "assistant", content: reply });
        saveCurrentChat();
      } catch (err) {
        assistantDiv.classList.remove("streaming");
        assistantDiv.textContent = `Error: ${err.message}`;
        console.error(err);
      }

      sendBtn.disabled = false;
      uploadIconBtn.disabled = false;
      uploadIconBtn.disabled = false;
      userInput.disabled = false;
      userInput.focus();
    }

    sendBtn.addEventListener("click", sendMessage);
    userInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    // File upload and drag-drop
    uploadBtn.addEventListener("click", () => fileInput.click());
    uploadIconBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", (e) => {
      if (e.target.files[0]) handleFileUpload(e.target.files[0]);
      e.target.value = "";
    });

    // Drag-drop handlers
    chatWindow.addEventListener("dragover", (e) => {
      e.preventDefault();
      e.stopPropagation();
      chatWindow.classList.add("drag-over");
    });

    chatWindow.addEventListener("dragleave", (e) => {
      e.preventDefault();
      e.stopPropagation();
      chatWindow.classList.remove("drag-over");
    });

    chatWindow.addEventListener("drop", (e) => {
      e.preventDefault();
      e.stopPropagation();
      chatWindow.classList.remove("drag-over");
      if (e.dataTransfer.files[0]) handleFileUpload(e.dataTransfer.files[0]);
    });

    // Multi-chat event listeners
    newChatBtn.addEventListener("click", createNewChat);

    // Initialize chats on load
    loadChatsFromStorage();

    function appendMessage(role, text, streaming = false, model = null) {
      const wrap = document.createElement("div");
      wrap.className = `msg-wrap ${role}`;

      const label = document.createElement("div");
      label.className = "msg-label";
      if (role === "user") {
        label.textContent = "You";
      } else if (role === "assistant" && model) {
        label.textContent = model;
      } else {
        label.textContent = "Assistant";
      }

      const bubble = document.createElement("div");
      bubble.className = `msg ${role}${streaming ? " streaming" : ""}`;
      if (streaming) {
        bubble.textContent = text;
      } else if (text) {
        // Only parse markdown for assistant messages
        if (role === "assistant") {
          bubble.appendChild(parseMarkdown(text));
        } else {
          bubble.textContent = text;
        }
      }

      wrap.appendChild(label);
      wrap.appendChild(bubble);
      chatWindow.appendChild(wrap);
      chatWindow.scrollTop = chatWindow.scrollHeight;
      return bubble;
    }

    function clearChat() {
      chatWindow.innerHTML = "";
      const es = document.createElement("div");
      es.id = "empty-state";
      es.className = "empty-state";
      es.innerHTML = `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg><p>Load a model to start chatting</p>`;
      chatWindow.appendChild(es);
    }
  </script>
</body>
</html>
